risk = "Overriding the broadcast/talk connection address to the signaling host only affects the negotiated address in the SDP offer; it never causes signaling to bind media ports or relay payloads. An incorrect address source can prevent audio from flowing, so the override is capability-gated (Broadcast) and defaults to the media node."
regression_test = "cheetah-gb28181-module media::tests::override_tests::{talk_offer_uses_media_node_address_by_default, talk_offer_uses_signaling_host_with_broadcast_override}"
removal_criteria = "Remove when the targeted intercom firmware accepts the media-node address in the talk SDP offer, or when the device model is retired from the fleet."
