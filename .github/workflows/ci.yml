name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Canonical Buf version for reproducible proto lint/format.
  BUF_VERSION: "1.50.0"

jobs:
  fmt-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: v1-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          cache-on-failure: false
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo clippy --workspace --all-targets -- -D warnings

  nextest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        with:
          key: v1-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          cache-on-failure: false
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo nextest run --workspace

  deny:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check

  doctest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
      - uses: Swatinem/rust-cache@v2
        with:
          key: v1-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          cache-on-failure: false
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo test --doc --workspace

  proto:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-action@v1
        with:
          version: ${{ env.BUF_VERSION }}
          lint: true
          format: true
          breaking: false
          push: false
          pr_comment: false

  contract-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: ${{ env.BUF_VERSION }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate descriptor and verify breaking compatibility
        run: ./scripts/generate_contract_baseline.sh

  feature-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        features:
          - "--no-default-features"
          - "--features edge"
          - "--features cluster"
          - "--no-default-features --features cluster"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
      - uses: Swatinem/rust-cache@v2
        with:
          key: v1-feature-matrix-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          cache-on-failure: false
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo clippy -p cheetah-signaling ${{ matrix.features }} --all-targets -- -D warnings
