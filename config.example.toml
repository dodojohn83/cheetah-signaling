# Cheetah Signaling example configuration.
#
# Copy this file and adjust values for your deployment. Unknown fields are
# rejected on startup, so spelling mistakes are caught immediately.
# Values shown here are examples; defaults are noted per field.

[system]
# Deployment profile: "edge" or "cluster".
# edge: SQLite + local bus, single-node, cluster disabled.
# cluster: PostgreSQL + NATS + ownership, cluster enabled.
# If omitted, the profile is inferred from storage/messaging/cluster settings.
profile = "edge"
# Human-readable node name. Default: "" (auto-generated).
node_name = "cheetah-edge-01"
# Data directory for SQLite, logs and local state. Must be writable.
data_dir = "/var/lib/cheetah"
# Log level filter. Default: "info". Hot-reload: no.
log_level = "info"
# Optional stable node UUID. If omitted a deterministic id is generated.
# node_id = "018f3b0a-..."

[runtime]
# Tokio worker threads. Default: 4. Range: >= 1.
worker_threads = 4
# Tokio blocking thread pool limit. Default: 512.
max_blocking_threads = 512
# Idle blocking thread keep-alive in milliseconds. Default: 10000.
thread_keep_alive_ms = 10000
# Per-actor mailbox capacity. Default: 1024.
queue_depth = 1024

[http]
# REST API bind address and port.
listen_addr = "0.0.0.0"
port = 8080
# Optional TLS secret references. If set, the API serves HTTPS.
# tls_cert_ref = "certs/api.crt"
# tls_key_ref = "certs/api.key"
# Request read timeout in milliseconds. Default: 5000.
read_timeout_ms = 5000
# Allowed CORS origins. Empty disables cross-origin access.
cors_allowed_origins = []
# Per-tenant token-bucket rate limit. Default: 100 req/s, burst 200.
rate_limit_requests_per_second = 100
rate_limit_burst = 200

[grpc]
# Internal gRPC API bind address and port.
listen_addr = "0.0.0.0"
port = 50051
# Optional mTLS secret references. Required for cluster deployments.
# tls_cert_ref = "certs/grpc.crt"
# tls_key_ref = "certs/grpc.key"

[storage]
# Backend: "sqlite" or "postgres". Default: "sqlite".
backend = "sqlite"
# SQLite database path. Used when backend = "sqlite".
sqlite_path = "/var/lib/cheetah/cheetah.db"
# PostgreSQL URL. Used when backend = "postgres" and postgres_url_ref is not set.
# Format: postgresql://user:password@host:port/database
# Keep credentials in a secret manager or env var; do not commit this file.
postgres_url = ""
# Optional secret reference for the PostgreSQL URL; takes precedence over postgres_url.
# postgres_url_ref = "database.postgres"
# Connection pool size. Default: 10.
max_connections = 10
# Connection acquisition timeout in milliseconds. Default: 5000.
connection_timeout_ms = 5000

[messaging]
# Backend: "local" or "nats". Default: "local" (edge single-node).
backend = "local"
# NATS server URL. Used when backend = "nats" and nats_url_ref is not set.
nats_url = ""
# Optional secret reference for the NATS URL; takes precedence over nats_url.
# nats_url_ref = "messaging.nats"
# JetStream domain. Leave empty for default.
jetstream_domain = ""
# Maximum pending messages per consumer. Default: 0 (unbounded in local mode).
# Set a positive value in production to bound memory.
max_pending = 1024

[cluster]
# Enable cluster mode. Default: false.
enabled = false
# Ownership lease TTL in milliseconds. Default: 0.
lease_ttl_ms = 10000
# Cluster heartbeat interval in milliseconds. Default: 0.
heartbeat_interval_ms = 3000

[media]
# Media node selection strategy. Default: "round-robin".
default_media_node_selector = "round-robin"
# Maximum concurrent media sessions per device. Default: 4.
max_sessions_per_device = 4
# Default SIP INVITE timeout in milliseconds. Default: 30000.
default_invite_timeout_ms = 30000

[plugins]
# Enable out-of-process plugin loading. Default: false.
enabled = false
# Directory scanned for plugin manifests/binaries.
plugin_dir = "/usr/lib/cheetah/plugins"
# Maximum plugin instances per node. Default: 0.
max_plugin_instances = 8

[gb28181]
# SIP domain for this node.
sip_domain = ""
# Local SIP port. Default: 0 (disabled).
sip_port = 5060
# Secret reference for the hex-encoded SIP digest secret. Required when sip_port > 0.
# The secret is resolved from the secret store; with the default env prefix this is
# looked up as CHEETAH_SECRET_GB28181_DIGEST.
digest_secret_ref = "gb28181.digest"
# Optional secret reference template for per-device passwords. {device_id} is replaced.
# device_password_ref = "gb28181.devices.{device_id}.password"
# Optional default tenant UUID for incoming GB28181 devices.
# When omitted, events that cannot be mapped to a tenant are dropped.
# default_tenant_id = "018f3b0a-..."
# Maximum concurrent catalog fragment assemblies held in memory.
# Default: 1024.
catalog_fragment_max_entries = 1024
# Maximum catalog items accumulated for a single (device, sequence number).
# Default: 8192.
catalog_fragment_max_items = 8192
# Media stream keep-alive timeout in milliseconds. Default: 0.
media_stream_timeout_ms = 30000

[secret]
# Prefix for environment-variable-backed secrets. Default: "CHEETAH_SECRET_".
env_prefix = "CHEETAH_SECRET_"
# Optional directory for file-backed secrets. Leave empty to disable.
# file_dir = "/etc/cheetah/secrets"

[onvif]
# Whether ONVIF discovery and command processing is enabled.
enabled = false
# ONVIF discovery timeout in milliseconds.
discovery_timeout_ms = 3000
# ONVIF probe timeout in milliseconds.
probe_timeout_ms = 5000
# HTTP connect timeout in milliseconds.
connect_timeout_ms = 5000
# HTTP request timeout (includes body download) in milliseconds.
request_timeout_ms = 15000
# Maximum response body size in bytes.
max_response_bytes = 2097152
# Maximum concurrent HTTP requests per driver client.
max_concurrent_requests = 32
# Whether to follow HTTP redirects (each hop re-checked against policy).
follow_redirects = false
# Allowed URL schemes for discovered device XAddrs.
allowed_schemes = ["http", "https"]
# Allowed destination ports for discovered device XAddrs. Empty allows any.
allowed_ports = [80, 443]
# Whether private (RFC 1918) addresses are allowed.
allow_private = false
# Whether loopback addresses are allowed.
allow_loopback = false
# Whether IPv4 link-local and IPv6 unicast link-local addresses are allowed.
allow_link_local = false
# Whether `0.0.0.0` / `::` is allowed.
allow_unspecified = false
# Whether domain-name hosts are allowed.
allow_domain_names = false
# Multicast group for WS-Discovery Probe. Default: 239.255.255.250:3702.
discovery_multicast = "239.255.255.250:3702"
# Local bind address for discovery sockets. Default: 0.0.0.0:0.
discovery_bind = "0.0.0.0:0"
# Maximum XML body size accepted for parsing discovery datagrams. Default: 65536.
discovery_max_datagram_bytes = 65536
# Maximum XML element depth for discovery datagrams. Default: 64.
discovery_max_xml_depth = 64
# Maximum XML elements to visit while parsing a discovery datagram. Default: 4096.
discovery_max_xml_nodes = 4096
# Maximum matched devices returned from a single ProbeMatches. Default: 256.
discovery_max_matches = 256
# Per-source rate limit window in seconds. Default: 60.
discovery_rate_window_seconds = 60
# Maximum discovery datagrams per source IP within the window. Default: 120.
discovery_rate_max_per_source = 120
# Maximum distinct source IPs tracked by the discovery rate limiter. Default: 1024.
discovery_rate_max_sources = 1024
# Interval between discovery sweeps in milliseconds. Zero disables periodic discovery. Default: 0.
discovery_interval_ms = 0
# Maximum concurrent device detail probes during a discovery sweep. Default: 8.
max_concurrent_probes = 8
# Optional default tenant UUID for discovered ONVIF devices. Required for provisioning.
# default_tenant_id = "00000000-0000-0000-0000-000000000000"

[security]
# Reference to the JWT public key secret. Leave empty to disable JWT auth.
jwt_public_key_ref = ""
# Expected JWT audiences. Empty disables audience validation.
jwt_audience = []
# Expected JWT issuers. Empty disables issuer validation.
jwt_issuer = []
# API key hash for service-to-service calls.
api_key_hash = ""
# Static API key for edge-mode management. Must be >= 32 bytes when set.
# Keep this in a secret manager or env var; do not commit plaintext.
static_api_key = ""
# Token TTL in milliseconds. Default: 0.
token_ttl_ms = 3600000

[observability]
# Bind address for the Prometheus /metrics endpoint.
metrics_bind_addr = "0.0.0.0:9090"
# Optional OTLP/gRPC tracing endpoint. Disabled if omitted.
# tracing_endpoint = "http://localhost:4317"
# Log format: "json" or "compact". Default: "json".
log_format = "json"
