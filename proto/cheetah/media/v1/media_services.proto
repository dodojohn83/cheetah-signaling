syntax = "proto3";

package cheetah.media.v1;

import "cheetah/media/v1/media.proto";
import "cheetah/media/v1/media_context.proto";
import "cheetah/media/v1/media_resource.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/dodojohn83/cheetah-signaling/gen/go/cheetah/media/v1;mediav1";

// Pagination request parameters.
message Pagination {
  // Opaque cursor produced by a previous list response.
  string cursor = 1;
  // Maximum number of items to return in one page.
  uint64 page_size = 2;
}

// Pagination metadata returned with list responses.
message PageInfo {
  // Cursor to retrieve the next page, empty when there is no next page.
  string next_cursor = 1;
  // True when more results are available.
  bool has_more = 2;
}

// Typed capability query.
message GetCapabilitiesRequest {
  MediaMutationContext context = 1;
}

message GetCapabilitiesResponse {
  repeated MediaCapability capabilities = 1;
}

// Capability discovery service.
service MediaCapabilityService {
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);
}

// Query request payloads.
message GetMediaRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
}

message GetMediaResponse {
  MediaSessionRef session = 1;
  string state = 2;
  MediaNodeInfo node = 3;
  MediaResourceState resource_state = 4;
}

message IsMediaOnlineRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
}

message IsMediaOnlineResponse {
  bool online = 1;
  uint64 owner_epoch = 2;
}

message ListSessionsRequest {
  MediaMutationContext context = 1;
  string device_id = 2;
  string channel_id = 3;
  Pagination pagination = 4;
}

message ListSessionsResponse {
  repeated MediaSessionRef sessions = 1;
  PageInfo page = 2;
}

// Filter for media search queries.
message MediaSearchFilter {
  // Media session identifier to search for.
  string media_session_id = 1;
  // Media binding identifier to search for.
  string media_binding_id = 2;
  // Media handle assigned by a media node.
  string media_handle = 3;
  // Stable media stream key.
  MediaKey media_key = 4;
  // Idempotency key used for a mutating request.
  string idempotency_key = 5;
}

message SearchMediaRequest {
  // Tenant and request context; the tenant filter is required.
  MediaMutationContext context = 1;
  // Optional filters; at least one should be set by callers.
  MediaSearchFilter filter = 2;
  // Pagination parameters.
  Pagination pagination = 3;
}

message SearchMediaResponse {
  // Matching media sessions.
  repeated MediaSessionRef sessions = 1;
  // Pagination metadata.
  PageInfo page = 2;
}

// Request to enumerate non-terminal resources for reconciliation.
message ReconcileMediaRequest {
  // Tenant and request context.
  MediaMutationContext context = 1;
  // Pagination parameters.
  Pagination pagination = 2;
  // Whether to include resources that have already reached a terminal state.
  bool include_terminal = 3;
}

message ReconcileMediaResponse {
  // Resources visible to the reconciler.
  repeated MediaSessionRef sessions = 1;
  // Pagination metadata.
  PageInfo page = 2;
}

// Media session query service.
service MediaQueryService {
  rpc GetMedia(GetMediaRequest) returns (GetMediaResponse);
  rpc IsMediaOnline(IsMediaOnlineRequest) returns (IsMediaOnlineResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc SearchMedia(SearchMediaRequest) returns (SearchMediaResponse);
}

// Media reconciliation service for background workers.
service MediaReconciliationService {
  rpc ReconcileMedia(ReconcileMediaRequest) returns (ReconcileMediaResponse);
}

// RTP receiver parameters.
message RtpReceiverParams {
  string remote_sdp = 1;
  repeated string media_kinds = 2;
}

// RTP sender parameters.
message RtpSenderParams {
  string remote_sdp = 1;
  repeated string media_kinds = 2;
}

message OpenReceiverRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
  string device_id = 3;
  string channel_id = 4;
  RtpReceiverParams params = 5;
}

message ConnectReceiverRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
  string remote_sdp = 3;
}

message OpenSenderRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
  string device_id = 3;
  string channel_id = 4;
  RtpSenderParams params = 5;
}

message UpdateReceiverRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
  string remote_sdp = 3;
}

message UpdateSenderRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
  string remote_sdp = 3;
}

message GetRtpSessionRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
}

message ListRtpSessionsRequest {
  MediaMutationContext context = 1;
  string device_id = 2;
  string channel_id = 3;
  Pagination pagination = 4;
}

message ListRtpSessionsResponse {
  repeated RtpSession sessions = 1;
  PageInfo page = 2;
}

message StopRtpRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
}

// RTP media service.
service MediaRtpService {
  rpc OpenReceiver(OpenReceiverRequest) returns (RtpSession);
  rpc ConnectReceiver(ConnectReceiverRequest) returns (RtpSession);
  rpc OpenSender(OpenSenderRequest) returns (RtpSession);
  rpc UpdateReceiver(UpdateReceiverRequest) returns (RtpSession);
  rpc UpdateSender(UpdateSenderRequest) returns (RtpSession);
  rpc GetRtpSession(GetRtpSessionRequest) returns (RtpSession);
  rpc ListRtpSessions(ListRtpSessionsRequest) returns (ListRtpSessionsResponse);
  rpc StopRtp(StopRtpRequest) returns (MediaSessionRefStopped);
}

// Proxy pull parameters.
message ProxyPullParams {
  string proxy_mode = 1;
  string upstream_url = 2;
}

message CreatePullRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
  string device_id = 3;
  string channel_id = 4;
  ProxyPullParams params = 5;
}

message GetPullRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
}

message ListPullRequest {
  MediaMutationContext context = 1;
  string device_id = 2;
  string channel_id = 3;
  Pagination pagination = 4;
}

message ListPullResponse {
  repeated ProxySession sessions = 1;
  PageInfo page = 2;
}

message DeletePullRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
}

// Proxy media service.
service MediaProxyService {
  rpc CreatePull(CreatePullRequest) returns (ProxySession);
  rpc GetPull(GetPullRequest) returns (ProxySession);
  rpc ListPull(ListPullRequest) returns (ListPullResponse);
  rpc DeletePull(DeletePullRequest) returns (MediaSessionRefStopped);
}

// Record file metadata.
message RecordFile {
  string record_id = 1;
  string storage_path = 2;
  int64 duration_ms = 3;
  int64 size_bytes = 4;
  google.protobuf.Timestamp started_at = 5;
  google.protobuf.Timestamp stopped_at = 6;
}

message StartRecordRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
  string record_id = 3;
  string storage_path = 4;
  int64 timeout_ms = 5;
}

message StopRecordRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
  string record_id = 3;
}

message GetRecordRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
  string record_id = 3;
}

message ListTasksRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
  Pagination pagination = 3;
}

message ListTasksResponse {
  repeated RecordSession tasks = 1;
  PageInfo page = 2;
}

message ListFilesRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
  Pagination pagination = 3;
}

message ListFilesResponse {
  repeated RecordFile files = 1;
  PageInfo page = 2;
}

// Recording media service.
service MediaRecordService {
  rpc StartRecord(StartRecordRequest) returns (RecordSession);
  rpc StopRecord(StopRecordRequest) returns (RecordSession);
  rpc GetRecord(GetRecordRequest) returns (RecordSession);
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
}

// Snapshot image format.
enum SnapshotFormat {
  SNAPSHOT_FORMAT_UNSPECIFIED = 0;
  SNAPSHOT_FORMAT_JPEG = 1;
  SNAPSHOT_FORMAT_PNG = 2;
}

message TakeSnapshotRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
  string snapshot_id = 3;
  SnapshotFormat format = 4;
}

message FetchSnapshotRequest {
  MediaMutationContext context = 1;
  string snapshot_id = 2;
}

message GetSnapshotRequest {
  MediaMutationContext context = 1;
  string snapshot_id = 2;
}

message ListSnapshotsRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
  Pagination pagination = 3;
}

message ListSnapshotsResponse {
  repeated Snapshot snapshots = 1;
  PageInfo page = 2;
}

// Snapshot media service.
service MediaSnapshotService {
  rpc TakeSnapshot(TakeSnapshotRequest) returns (Snapshot);
  rpc FetchSnapshot(FetchSnapshotRequest) returns (Snapshot);
  rpc GetSnapshot(GetSnapshotRequest) returns (Snapshot);
  rpc ListSnapshots(ListSnapshotsRequest) returns (ListSnapshotsResponse);
}

// Playback control value.
enum PlaybackControl {
  PLAYBACK_CONTROL_UNSPECIFIED = 0;
  PLAYBACK_CONTROL_PLAY = 1;
  PLAYBACK_CONTROL_PAUSE = 2;
  PLAYBACK_CONTROL_SEEK = 3;
  PLAYBACK_CONTROL_STOP = 4;
}

message PlaybackSession {
  string media_session_id = 1;
  string playback_id = 2;
  string source_url = 3;
  string status = 4;
  int64 position_ms = 5;
  int64 duration_ms = 6;

  // Resource reference returned by the media node.
  MediaHandle handle = 7;
  MediaKey media_key = 8;
  MediaResourceState resource_state = 9;
}

message OpenPlaybackRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
  string device_id = 3;
  string channel_id = 4;
  string source_url = 5;
  int64 start_position_ms = 6;
}

message GetPlaybackRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
}

message ListPlaybacksRequest {
  MediaMutationContext context = 1;
  string device_id = 2;
  string channel_id = 3;
  Pagination pagination = 4;
}

message ListPlaybacksResponse {
  repeated PlaybackSession sessions = 1;
  PageInfo page = 2;
}

message ControlPlaybackRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
  PlaybackControl control = 3;
  int64 seek_position_ms = 4;
}

message StopPlaybackRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
}

// Playback media service.
service MediaPlaybackService {
  rpc OpenPlayback(OpenPlaybackRequest) returns (PlaybackSession);
  rpc GetPlayback(GetPlaybackRequest) returns (PlaybackSession);
  rpc ListPlaybacks(ListPlaybacksRequest) returns (ListPlaybacksResponse);
  rpc ControlPlayback(ControlPlaybackRequest) returns (PlaybackSession);
  rpc StopPlayback(StopPlaybackRequest) returns (MediaSessionRefStopped);
}

// Signed output URL parameters.
message OutputUrlParams {
  string protocol = 1;
  int64 ttl_seconds = 2;
  repeated string allowed_ips = 3;
}

message ResolveUrlsRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
  repeated OutputUrlParams params = 3;
}

message ResolvedUrl {
  string protocol = 1;
  string url = 2;
  int64 expires_at_epoch_seconds = 3;
}

message ResolveUrlsResponse {
  repeated ResolvedUrl urls = 1;
}

// Output URL service.
service MediaOutputUrlService {
  rpc ResolveUrls(ResolveUrlsRequest) returns (ResolveUrlsResponse);
}

// Media control commands.
message RequestKeyframeRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
}

message CloseSessionRequest {
  MediaMutationContext context = 1;
  string media_session_id = 2;
}

// Generic media control service.
service MediaControlService {
  rpc RequestKeyframe(RequestKeyframeRequest) returns (MediaSessionRef);
  rpc CloseSession(CloseSessionRequest) returns (MediaSessionRefStopped);
}

// Filter applied to a media event subscription.
message MediaEventFilter {
  // Optional media session identifier.
  string media_session_id = 1;
  // Optional media binding identifier.
  string media_binding_id = 2;
  // Optional media handle.
  string media_handle = 3;
  // Optional stable media key.
  MediaKey media_key = 4;
  // Optional set of event payload type names (e.g. "stream_online").
  repeated string event_types = 5;
}

// Subscription request for media events.
//
// Server semantics:
// - Delivery is at-least-once within the subscription cursor window.
// - Duplicate event_id values are silently ignored by the client contract.
// - sequence is scoped to (tenant_id, media_node_id).
// - resume_cursor must be durable for at least the configured retention period.
// - The server does not hide missing sequence numbers; gap detection is signaled
//   out-of-band when ordering can no longer be guaranteed.
// - Slow consumers may be disconnected or downgraded according to policy.
// - Reconnects and cancellations are explicit: closing the stream cancels
//   delivery for that subscriber.
// - An empty tenant_id filter is interpreted as "all tenants"; the server must
//   support this when the subscriber is authorized for cross-tenant observation.
message SubscribeRequest {
  // Tenant and request context; tenant_id is the required filter.
  MediaMutationContext context = 1;

  // Optional list of media session identifiers to narrow the subscription.
  repeated string media_session_ids = 2;

  // Cursor to resume from a previous subscription. Empty starts from the tail.
  string resume_cursor = 3;

  // Maximum number of events to return in one streamed response message.
  uint64 max_batch_size = 4;

  // Optional structured filter beyond the tenant and session list.
  MediaEventFilter filter = 5;
}

// Media event streaming service.
service MediaEventStreamService {
  // Subscribe to a stream of media events.
  rpc Subscribe(SubscribeRequest) returns (stream MediaEvent);
}
