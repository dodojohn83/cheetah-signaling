syntax = "proto3";

package cheetah.control.v1;

option go_package = "github.com/dodojohn83/cheetah-signaling/gen/go/cheetah/control/v1;controlv1";

// A command for controlling devices and channels.
message ControlCommand {
  oneof command {
    InviteDevice invite_device = 1;
    KickDevice kick_device = 2;
    StartChannel start_channel = 3;
    StopChannel stop_channel = 4;
    ChannelCommand channel_command = 5;
  }
}

message InviteDevice {
  string device_id = 1;
  string channel_id = 2;
  string media_node_id = 3;
  int64 invite_timeout_ms = 4;
}

message KickDevice {
  string device_id = 1;
  string channel_id = 2;
  string reason = 3;
}

message StartChannel {
  string device_id = 1;
  string channel_id = 2;
  string media_session_id = 3;
}

message StopChannel {
  string device_id = 1;
  string channel_id = 2;
}

message ChannelCommand {
  string device_id = 1;
  string channel_id = 2;
  string command_type = 3;
  bytes payload = 4;
  oneof detail {
    PtzCommand ptz = 5;
    PresetCommand preset = 6;
    QueryCommand query = 7;
    DeviceControlCommand device_control = 8;
  }
}

message PtzCommand {
  PtzDirection direction = 1;
  double speed = 2;
}

enum PtzDirection {
  PTZ_DIRECTION_UNSPECIFIED = 0;
  PTZ_DIRECTION_STOP = 1;
  PTZ_DIRECTION_UP = 2;
  PTZ_DIRECTION_DOWN = 3;
  PTZ_DIRECTION_LEFT = 4;
  PTZ_DIRECTION_RIGHT = 5;
  PTZ_DIRECTION_UP_LEFT = 6;
  PTZ_DIRECTION_UP_RIGHT = 7;
  PTZ_DIRECTION_DOWN_LEFT = 8;
  PTZ_DIRECTION_DOWN_RIGHT = 9;
  PTZ_DIRECTION_ZOOM_IN = 10;
  PTZ_DIRECTION_ZOOM_OUT = 11;
}

message PresetCommand {
  PresetAction action = 1;
  uint32 preset_id = 2;
}

enum PresetAction {
  PRESET_ACTION_UNSPECIFIED = 0;
  PRESET_ACTION_GOTO = 1;
  PRESET_ACTION_SET = 2;
  PRESET_ACTION_DELETE = 3;
  PRESET_ACTION_LIST = 4;
}

message QueryCommand {
  QueryKind kind = 1;
  string channel_id = 2;
  int64 start_time_unix_ms = 3;
  int64 end_time_unix_ms = 4;
  string config_type = 5;
  double scale = 6;
}

enum QueryKind {
  QUERY_KIND_UNSPECIFIED = 0;
  QUERY_KIND_CATALOG = 1;
  QUERY_KIND_DEVICE_INFO = 2;
  QUERY_KIND_DEVICE_STATUS = 3;
  QUERY_KIND_RECORD_INFO = 4;
  QUERY_KIND_PRESET_QUERY = 5;
  QUERY_KIND_CONFIG_DOWNLOAD = 6;
}

message DeviceControlCommand {
  DeviceControlKind kind = 1;
  string channel_id = 2;
  bool enabled = 3;
  string param = 4;
}

enum DeviceControlKind {
  DEVICE_CONTROL_KIND_UNSPECIFIED = 0;
  DEVICE_CONTROL_KIND_GUARD = 1;
  DEVICE_CONTROL_KIND_ALARM_RESET = 2;
  DEVICE_CONTROL_KIND_RECORD = 3;
  DEVICE_CONTROL_KIND_TELE_BOOT = 4;
  DEVICE_CONTROL_KIND_I_FRAME = 5;
  DEVICE_CONTROL_KIND_DEVICE_CONFIG = 6;
}

// Result of a control command.
message ControlCommandResult {
  bool success = 1;
  string error_code = 2;
  string error_message = 3;
}

// An event emitted by a control aggregate.
message ControlEvent {
  oneof event {
    DeviceInvited device_invited = 1;
    DeviceKicked device_kicked = 2;
    ChannelStarted channel_started = 3;
    ChannelStopped channel_stopped = 4;
    CommandCompleted command_completed = 5;
  }
}

message DeviceInvited {
  string device_id = 1;
  string channel_id = 2;
  string media_session_id = 3;
}

message DeviceKicked {
  string device_id = 1;
  string channel_id = 2;
  string reason = 3;
}

message ChannelStarted {
  string device_id = 1;
  string channel_id = 2;
  string media_session_id = 3;
}

message ChannelStopped {
  string device_id = 1;
  string channel_id = 2;
}

message CommandCompleted {
  string operation_id = 1;
  string device_id = 2;
  string channel_id = 3;
  string command_type = 4;
  ControlCommandResult result = 5;
}
