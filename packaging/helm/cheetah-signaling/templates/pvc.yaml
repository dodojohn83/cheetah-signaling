{{- if and .Values.persistence.enabled (eq .Values.config.storage.backend "sqlite") -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "cheetah-signaling.fullname" . }}-data
  labels:
    {{- include "cheetah-signaling.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass }}
  {{- end }}
{{- end }}
