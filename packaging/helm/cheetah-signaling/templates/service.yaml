apiVersion: v1
kind: Service
metadata:
  name: {{ include "cheetah-signaling.fullname" . }}
  labels:
    {{- include "cheetah-signaling.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "cheetah-signaling.selectorLabels" . | nindent 4 }}
