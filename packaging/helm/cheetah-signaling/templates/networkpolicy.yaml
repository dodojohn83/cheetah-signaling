{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cheetah-signaling.fullname" . }}
  labels:
    {{- include "cheetah-signaling.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cheetah-signaling.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # HTTP API and gRPC from any in-cluster source.
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.service.httpPort }}
        - protocol: TCP
          port: {{ .Values.service.grpcPort }}
    # Device protocol ports are left open to cluster nodes; narrow by CIDR in
    # production with .Values.networkPolicy.additionalIngress.
    {{- with .Values.networkPolicy.additionalIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # Same-namespace and configured database/NATS peers.
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 4222
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090
    {{- with .Values.networkPolicy.additionalEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
